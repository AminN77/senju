name: Security Scans

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache-dependency-path: backend/go.sum
      - name: govulncheck (fail on findings)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f backend/Dockerfile -t senju-api:scan backend
      - name: Trivy image scan (critical only)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.56.2 \
            image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            senju-api:scan
