name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: senju
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d senju"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/senju?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backend
          version: v2.11.4
          args: --timeout=5m

      - name: Go test (race detector)
        # Serialize packages so Postgres integration tests (migrations + job repo) do not contend on one DB.
        run: go test -race -p 1 ./...

      - name: Go vet
        run: go vet ./...

      - name: Performance regression gate
        run: |
          go test -run '^$' -bench 'BenchmarkMultipartInit_Throughput|BenchmarkAlignmentHandle_Throughput|BenchmarkGetVariants_Latency' -benchmem -count=1 ./internal/api/objectupload ./internal/pipeline/alignment ./internal/api/variantquery > /tmp/bench.txt
          go run ./cmd/perfcheck
