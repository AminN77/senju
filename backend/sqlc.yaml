version: "2"
sql:
  - engine: postgresql
    schema:
      - migrations/000001_jobs.up.sql
    queries: internal/job/db/queries
    gen:
      go:
        package: jobdb
        out: internal/job/db/jobdb
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
