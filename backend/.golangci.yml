# golangci-lint configuration — aligns with docs/backend-engineering.md
# and https://github.com/uber-go/guide/blob/master/style.md
# Reference: https://golangci-lint.run/configuration/

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - unused
    - wastedassign

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
