openapi: 3.0.3
info:
  title: Senju API
  description: |
    Genomic Data Platform control-plane HTTP API (REST).

    Implementation uses **Go** and **Gin** per the project proposal (Fiber/Gin) and **ADR-0004**.
    Readiness checks reflect **PostgreSQL**, **ClickHouse**, **MinIO**, and **NATS** per **ADR-0001–0003**
    and the approved architecture (metadata in Postgres, analytics in ClickHouse, object storage in MinIO, queue on NATS).
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Info
    description: Service identity and build metadata
  - name: Health
    description: Liveness and readiness probes for orchestration
  - name: Observability
    description: Prometheus metrics for monitoring
  - name: Ingestion
    description: Genomic ingestion job metadata (e.g. FASTQ upload tracking)
  - name: Object storage
    description: Presigned multipart uploads to S3-compatible storage (e.g. MinIO) for large objects
paths:
  /:
    get:
      tags:
        - Info
      summary: API root
      description: Short plaintext identifier for the running service.
      operationId: getRoot
      responses:
        "200":
          description: Service identifier
          content:
            text/plain:
              schema:
                type: string
                example: "senju api\n"
  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Returns 200 if the process is running. Used for container orchestration.
      operationId: getHealthLive
      responses:
        "200":
          description: Service is alive
          content:
            text/plain:
              schema:
                type: string
                example: "ok\n"
  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Returns 200 when dependencies are reachable; 503 otherwise.
      operationId: getHealthReady
      responses:
        "200":
          description: Dependencies are ready
          content:
            text/plain:
              schema:
                type: string
        "503":
          description: One or more dependencies are not ready
          content:
            text/plain:
              schema:
                type: string
  /version:
    get:
      tags:
        - Info
      summary: Build metadata
      operationId: getVersion
      responses:
        "200":
          description: Version information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
  /metrics:
    get:
      tags:
        - Observability
      summary: Prometheus metrics
      description: OpenMetrics / Prometheus text exposition (runtime, process, build).
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string
  /v1/jobs/fastq-upload/metadata:
    post:
      tags:
        - Ingestion
      summary: Register FASTQ upload metadata
      description: |
        Validates paired-end FASTQ ingestion metadata and persists a `jobs` row (`stage=fastq_upload_queued`).
        Requires PostgreSQL to be configured; otherwise returns 503.
      operationId: postFastqUploadMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FastqUploadMetadataRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FastqUploadMetadataResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Database not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/jobs/fastq-upload/{job_id}/validate:
    post:
      tags:
        - Ingestion
      summary: Validate FASTQ stream and persist result
      description: |
        Streams FASTQ content from the request body, validates format incrementally with bounded memory,
        and stores the validation output on the referenced job (`output_ref`).
      operationId: postFastqUploadValidate
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              description: Raw FASTQ content
      responses:
        "200":
          description: Validation completed (valid or invalid FASTQ)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FastqValidationResponse"
        "400":
          description: Invalid job_id or unreadable validation stream
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence failure when storing validation result
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Database not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/objects/multipart:
    post:
      tags:
        - Object storage
      summary: Start multipart upload
      description: |
        Creates an S3 multipart upload and returns the object key, upload ID, and recommended part size (64 MiB).
        Requires S3 endpoint and bucket configuration; otherwise returns 503.
      operationId: postObjectMultipartInit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultipartInitRequest"
      responses:
        "201":
          description: Multipart upload initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultipartInitResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Object store operation failed
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Object storage not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/objects/multipart/{upload_id}/parts:
    post:
      tags:
        - Object storage
      summary: Presign multipart part upload
      description: Returns a presigned PUT URL for one part. Client uploads bytes to that URL, then collects ETag from the response.
      operationId: postObjectMultipartPresignPart
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignPartRequest"
      responses:
        "200":
          description: Presigned URL for the part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignPartResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Presign failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Object storage not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/objects/multipart/{upload_id}/complete:
    post:
      tags:
        - Object storage
      summary: Complete multipart upload
      description: |
        Completes the multipart upload with part ETags, verifies the object via HeadObject, and emits an audit log line
        with object key, size, and ETag.
      operationId: postObjectMultipartComplete
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultipartCompleteRequest"
      responses:
        "200":
          description: Object finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultipartCompleteResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Complete or verification failed
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Object storage not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  schemas:
    VersionInfo:
      type: object
      required:
        - service
        - version
        - commit
        - build_time
      properties:
        service:
          type: string
          example: senju-api
        version:
          type: string
        commit:
          type: string
        build_time:
          type: string
    FastqUploadMetadataRequest:
      type: object
      additionalProperties: false
      required:
        - sample_id
        - r1_uri
        - r2_uri
      properties:
        sample_id:
          type: string
          minLength: 1
          description: Sample identifier for this ingestion job (whitespace-only rejected by handler).
        r1_uri:
          type: string
          minLength: 1
          description: URI for read 1 (forward) — http(s), s3, or gs.
        r2_uri:
          type: string
          minLength: 1
          description: URI for read 2 (reverse) — http(s), s3, or gs.
        library_id:
          type: string
        platform:
          type: string
        notes:
          type: string
    FastqUploadMetadataResponse:
      type: object
      required:
        - job_id
      properties:
        job_id:
          type: string
          format: uuid
    FastqValidationResponse:
      type: object
      required:
        - valid
        - records
      properties:
        valid:
          type: boolean
          description: True when FASTQ format checks pass.
        records:
          type: integer
          format: int64
          description: Number of complete FASTQ records read.
        failure_reason:
          type: string
          description: Present only when valid=false.
        failure_record:
          type: integer
          format: int64
          description: One-based record index for the failure, when available.
    MultipartInitRequest:
      type: object
      additionalProperties: false
      required:
        - content_type
      properties:
        content_type:
          type: string
          minLength: 1
          description: Object Content-Type for the completed object (e.g. application/gzip).
        filename_hint:
          type: string
          description: Optional filename segment used in the generated object key (sanitized server-side).
    MultipartInitResponse:
      type: object
      required:
        - bucket
        - object_key
        - upload_id
        - part_size_bytes
      properties:
        bucket:
          type: string
        object_key:
          type: string
        upload_id:
          type: string
        part_size_bytes:
          type: integer
          format: int64
          description: Recommended part size in bytes (64 MiB).
    PresignPartRequest:
      type: object
      additionalProperties: false
      required:
        - object_key
        - part_number
      properties:
        object_key:
          type: string
          minLength: 1
        part_number:
          type: integer
          format: int32
          minimum: 1
          maximum: 10000
    PresignPartResponse:
      type: object
      required:
        - url
        - expires_at
      properties:
        url:
          type: string
          format: uri
        expires_at:
          type: string
          description: RFC3339Nano expiry for the presigned URL
    CompletePart:
      type: object
      required:
        - part_number
        - etag
      properties:
        part_number:
          type: integer
          format: int32
        etag:
          type: string
          description: ETag returned by S3 after uploading the part (quoted or unquoted).
    MultipartCompleteRequest:
      type: object
      additionalProperties: false
      required:
        - object_key
        - parts
      properties:
        object_key:
          type: string
          minLength: 1
        parts:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CompletePart"
    MultipartCompleteResponse:
      type: object
      required:
        - object_key
        - etag
        - size_bytes
      properties:
        object_key:
          type: string
        etag:
          type: string
        size_bytes:
          type: integer
          format: int64
    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
          description: Stable code such as required or invalid_uri.
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
