openapi: 3.0.3
info:
  title: Senju API
  description: |
    Genomic Data Platform control-plane HTTP API (REST).

    Implementation uses **Go** and **Gin** per the project proposal (Fiber/Gin) and **ADR-0004**.
    Readiness checks reflect **PostgreSQL**, **ClickHouse**, **MinIO**, and **NATS** per **ADR-0001–0003**
    and the approved architecture (metadata in Postgres, analytics in ClickHouse, object storage in MinIO, queue on NATS).
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Info
    description: Service identity and build metadata
  - name: Health
    description: Liveness and readiness probes for orchestration
  - name: Observability
    description: Prometheus metrics for monitoring
  - name: Ingestion
    description: Genomic ingestion job metadata (e.g. FASTQ upload tracking)
  - name: Object storage
    description: Presigned multipart uploads to S3-compatible storage (e.g. MinIO) for large objects
  - name: Auth
    description: Authentication and session management
paths:
  /:
    get:
      tags:
        - Info
      summary: API root
      description: Short plaintext identifier for the running service.
      operationId: getRoot
      responses:
        "200":
          description: Service identifier
          content:
            text/plain:
              schema:
                type: string
                example: "senju api\n"
  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Returns 200 if the process is running. Used for container orchestration.
      operationId: getHealthLive
      responses:
        "200":
          description: Service is alive
          content:
            text/plain:
              schema:
                type: string
                example: "ok\n"
  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Returns 200 when dependencies are reachable; 503 otherwise.
      operationId: getHealthReady
      responses:
        "200":
          description: Dependencies are ready
          content:
            text/plain:
              schema:
                type: string
        "503":
          description: One or more dependencies are not ready
          content:
            text/plain:
              schema:
                type: string
  /version:
    get:
      tags:
        - Info
      summary: Build metadata
      operationId: getVersion
      responses:
        "200":
          description: Version information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
  /metrics:
    get:
      tags:
        - Observability
      summary: Prometheus metrics
      description: OpenMetrics / Prometheus text exposition (runtime, process, build).
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string
  /v1/auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user and issue access token
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Authenticated session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          description: Invalid credentials
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token from refresh cookie
      operationId: postAuthRefresh
      responses:
        "200":
          description: Refreshed session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          description: Missing or invalid refresh session
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke session and clear refresh cookie
      operationId: postAuthLogout
      responses:
        "204":
          description: Logout completed
  /v1/auth/session:
    get:
      tags:
        - Auth
      summary: Resolve current authenticated session
      operationId: getAuthSession
      responses:
        "200":
          description: Current user session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "401":
          description: No active authenticated session
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/jobs/fastq-upload/metadata:
    post:
      tags:
        - Ingestion
      security:
        - bearerAuth: []
      summary: Register FASTQ upload metadata
      description: |
        Validates paired-end FASTQ ingestion metadata and persists a `jobs` row (`stage=fastq_upload_queued`).
        Requires PostgreSQL to be configured; otherwise returns 503.
      operationId: postFastqUploadMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FastqUploadMetadataRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FastqUploadMetadataResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Database not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/jobs/fastq-upload/{job_id}/validate:
    post:
      tags:
        - Ingestion
      security:
        - bearerAuth: []
      summary: Validate FASTQ stream and persist result
      description: |
        Streams FASTQ content from the request body, validates format incrementally with bounded memory,
        and stores the validation output on the referenced job (`output_ref`).
      operationId: postFastqUploadValidate
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              description: Raw FASTQ content
      responses:
        "200":
          description: Validation completed (valid or invalid FASTQ)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FastqValidationResponse"
        "400":
          description: Invalid job_id or unreadable validation stream
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence failure when storing validation result
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Database not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/jobs/pipeline:
    post:
      tags:
        - Ingestion
      security:
        - bearerAuth: []
      summary: Create a pipeline orchestration job
      description: |
        Creates a job record for end-to-end pipeline orchestration in a queued state.
      operationId: postPipelineJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineCreateRequest"
      responses:
        "201":
          description: Pipeline job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineCreateResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Database not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/jobs/{job_id}/run:
    post:
      tags:
        - Ingestion
      security:
        - bearerAuth: []
      summary: Run pipeline orchestration for a job
      description: |
        Executes orchestration state transitions for a queued job and stores auditable output metadata.
      operationId: postPipelineRun
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pipeline run finished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunResponse"
        "400":
          description: Invalid job_id or unknown job
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Job not in runnable state
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence or orchestration failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Database not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/jobs/{job_id}/status:
    get:
      tags:
        - Ingestion
      security:
        - bearerAuth: []
      summary: Fetch orchestration job status
      operationId: getPipelineJobStatus
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current orchestration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStatusResponse"
        "400":
          description: Invalid job_id or unknown job
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Database not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/jobs/{job_id}/outputs:
    get:
      tags:
        - Ingestion
      security:
        - bearerAuth: []
      summary: Retrieve orchestration job outputs
      operationId: getPipelineJobOutputs
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Output reference payload for the orchestration run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineOutputsResponse"
        "400":
          description: Invalid job_id or unknown job
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Database not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/objects/multipart:
    post:
      tags:
        - Object storage
      security:
        - bearerAuth: []
      summary: Start multipart upload
      description: |
        Creates an S3 multipart upload and returns the object key, upload ID, and recommended part size (64 MiB).
        Requires S3 endpoint and bucket configuration; otherwise returns 503.
      operationId: postObjectMultipartInit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultipartInitRequest"
      responses:
        "201":
          description: Multipart upload initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultipartInitResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Object store operation failed
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Object storage not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/objects/multipart/{upload_id}/parts:
    post:
      tags:
        - Object storage
      security:
        - bearerAuth: []
      summary: Presign multipart part upload
      description: Returns a presigned PUT URL for one part. Client uploads bytes to that URL, then collects ETag from the response.
      operationId: postObjectMultipartPresignPart
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignPartRequest"
      responses:
        "200":
          description: Presigned URL for the part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignPartResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Presign failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Object storage not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/objects/multipart/{upload_id}/complete:
    post:
      tags:
        - Object storage
      security:
        - bearerAuth: []
      summary: Complete multipart upload
      description: |
        Completes the multipart upload with part ETags, verifies the object via HeadObject, and emits an audit log line
        with object key, size, and ETag.
      operationId: postObjectMultipartComplete
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultipartCompleteRequest"
      responses:
        "200":
          description: Object finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultipartCompleteResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Complete or verification failed
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Object storage not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/variants:
    get:
      tags:
        - Ingestion
      security:
        - bearerAuth: []
      summary: Query variants with filters and pagination
      description: |
        Queries variant rows stored in ClickHouse with optional chromosome, position range, and gene filters.
        Supports page-based pagination.
      operationId: getVariants
      parameters:
        - name: chromosome
          in: query
          schema:
            type: string
            pattern: "^[A-Za-z0-9._-]+$"
          description: Exact chromosome value (example `chr1`).
        - name: position_min
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
            maximum: 4294967295
          description: Inclusive lower bound for position.
        - name: position_max
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
            maximum: 4294967295
          description: Inclusive upper bound for position.
        - name: gene
          in: query
          schema:
            type: string
            pattern: "^[A-Za-z0-9._-]+$"
          description: Gene symbol filter extracted from INFO payload (example `TP53`).
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Paginated variant results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariantQueryResponse"
        "400":
          description: Invalid query filters
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Query execution failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Variant query service not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/ml/impact/train:
    post:
      tags:
        - Ingestion
      security:
        - bearerAuth: []
      summary: Train baseline impact model
      description: |
        Trains the baseline variant impact model using labeled variant samples and returns reproducibility metadata.
      operationId: postMLImpactTrain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpactTrainRequest"
      responses:
        "200":
          description: Model trained
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactTrainResponse"
        "400":
          description: Malformed JSON or invalid training samples
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: ML service not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /v1/ml/impact/{job_id}/predict:
    post:
      tags:
        - Ingestion
      security:
        - bearerAuth: []
      summary: Predict variant impact and persist output
      description: |
        Scores one variant with the current baseline model and persists prediction metadata to the referenced job output.
      operationId: postMLImpactPredict
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpactPredictRequest"
      responses:
        "200":
          description: Prediction persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactPredictResponse"
        "400":
          description: Malformed JSON, invalid payload, or unknown job
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Model has not been trained yet
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: ML service not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthUser:
      type: object
      required:
        - id
        - email
        - role
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [uploader, runner, analyst, admin]
    AuthLoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    AuthSessionResponse:
      type: object
      required:
        - user
        - access_token
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        access_token:
          type: string
    AuthSessionUserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
    VersionInfo:
      type: object
      required:
        - service
        - version
        - commit
        - build_time
      properties:
        service:
          type: string
          example: senju-api
        version:
          type: string
        commit:
          type: string
        build_time:
          type: string
    FastqUploadMetadataRequest:
      type: object
      additionalProperties: false
      required:
        - sample_id
        - r1_uri
        - r2_uri
      properties:
        sample_id:
          type: string
          minLength: 1
          description: Sample identifier for this ingestion job (whitespace-only rejected by handler).
        r1_uri:
          type: string
          minLength: 1
          description: URI for read 1 (forward) — http(s), s3, or gs.
        r2_uri:
          type: string
          minLength: 1
          description: URI for read 2 (reverse) — http(s), s3, or gs.
        library_id:
          type: string
        platform:
          type: string
        notes:
          type: string
    FastqUploadMetadataResponse:
      type: object
      required:
        - job_id
      properties:
        job_id:
          type: string
          format: uuid
    FastqValidationResponse:
      type: object
      required:
        - valid
        - records
      properties:
        valid:
          type: boolean
          description: True when FASTQ format checks pass.
        records:
          type: integer
          format: int64
          description: Number of complete FASTQ records read.
        failure_reason:
          type: string
          description: Present only when valid=false.
        failure_record:
          type: integer
          format: int64
          description: One-based record index for the failure, when available.
    PipelineCreateRequest:
      type: object
      additionalProperties: false
      required:
        - sample_id
        - r1_uri
        - r2_uri
      properties:
        sample_id:
          type: string
          minLength: 1
        r1_uri:
          type: string
          minLength: 1
        r2_uri:
          type: string
          minLength: 1
        force_fail:
          type: boolean
          description: Test hook to force a controlled orchestration failure.
    PipelineCreateResponse:
      type: object
      required:
        - job_id
      properties:
        job_id:
          type: string
          format: uuid
    PipelineRunResponse:
      type: object
      required:
        - job_id
        - status
        - stage
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
        stage:
          type: string
    PipelineStatusResponse:
      type: object
      required:
        - job_id
        - status
        - stage
        - updated_at
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
        stage:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PipelineOutputsResponse:
      type: object
      required:
        - job_id
        - output_ref
      properties:
        job_id:
          type: string
          format: uuid
        output_ref:
          description: Opaque orchestration output payload persisted on the job.
          type: object
          additionalProperties: true
          nullable: true
    VariantRecord:
      type: object
      required:
        - chromosome
        - position
        - ref
        - alt
        - filter
        - info
      properties:
        chromosome:
          type: string
        position:
          type: integer
          format: int64
        ref:
          type: string
        alt:
          type: string
        qual:
          type: number
          format: double
          nullable: true
        filter:
          type: string
        info:
          type: string
        gene:
          type: string
    VariantQueryFilters:
      type: object
      properties:
        chromosome:
          type: string
        position_min:
          type: integer
          format: int64
        position_max:
          type: integer
          format: int64
        gene:
          type: string
    VariantQueryResponse:
      type: object
      required:
        - data
        - page
        - page_size
        - total
        - has_next
        - latency_ms
        - filters
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: "#/components/schemas/VariantRecord"
        page:
          type: integer
          format: int32
        page_size:
          type: integer
          format: int32
        total:
          type: integer
          format: int64
        has_next:
          type: boolean
        latency_ms:
          type: integer
          format: int64
        filters:
          $ref: "#/components/schemas/VariantQueryFilters"
    ImpactModelMetadata:
      type: object
      required:
        - dataset_hash
        - feature_version
        - model_version
        - trained_at
        - sample_count
      properties:
        dataset_hash:
          type: string
        feature_version:
          type: string
        model_version:
          type: string
        trained_at:
          type: string
          format: date-time
        sample_count:
          type: integer
          format: int32
    ImpactTrainSample:
      type: object
      additionalProperties: false
      required:
        - chromosome
        - position
        - ref
        - alt
