openapi: 3.0.3
info:
  title: Senju API
  description: |
    Genomic Data Platform control-plane HTTP API (REST).

    Implementation uses **Go** and **Gin** per the project proposal (Fiber/Gin) and **ADR-0004**.
    Readiness checks reflect **PostgreSQL**, **ClickHouse**, **MinIO**, and **NATS** per **ADR-0001–0003**
    and the approved architecture (metadata in Postgres, analytics in ClickHouse, object storage in MinIO, queue on NATS).
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Info
    description: Service identity and build metadata
  - name: Health
    description: Liveness and readiness probes for orchestration
  - name: Observability
    description: Prometheus metrics for monitoring
  - name: Ingestion
    description: Genomic ingestion job metadata (e.g. FASTQ upload tracking)
paths:
  /:
    get:
      tags:
        - Info
      summary: API root
      description: Short plaintext identifier for the running service.
      operationId: getRoot
      responses:
        "200":
          description: Service identifier
          content:
            text/plain:
              schema:
                type: string
                example: "senju api\n"
  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Returns 200 if the process is running. Used for container orchestration.
      operationId: getHealthLive
      responses:
        "200":
          description: Service is alive
          content:
            text/plain:
              schema:
                type: string
                example: "ok\n"
  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Returns 200 when dependencies are reachable; 503 otherwise.
      operationId: getHealthReady
      responses:
        "200":
          description: Dependencies are ready
          content:
            text/plain:
              schema:
                type: string
        "503":
          description: One or more dependencies are not ready
          content:
            text/plain:
              schema:
                type: string
  /version:
    get:
      tags:
        - Info
      summary: Build metadata
      operationId: getVersion
      responses:
        "200":
          description: Version information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
  /metrics:
    get:
      tags:
        - Observability
      summary: Prometheus metrics
      description: OpenMetrics / Prometheus text exposition (runtime, process, build).
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string
  /v1/jobs/fastq-upload/metadata:
    post:
      tags:
        - Ingestion
      summary: Register FASTQ upload metadata
      description: |
        Validates paired-end FASTQ ingestion metadata and persists a `jobs` row (`stage=fastq_upload_queued`).
        Requires PostgreSQL to be configured; otherwise returns 503.
      operationId: postFastqUploadMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FastqUploadMetadataRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FastqUploadMetadataResponse"
        "400":
          description: Malformed JSON or validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Persistence failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Database not configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  schemas:
    VersionInfo:
      type: object
      required:
        - service
        - version
        - commit
        - build_time
      properties:
        service:
          type: string
          example: senju-api
        version:
          type: string
        commit:
          type: string
        build_time:
          type: string
    FastqUploadMetadataRequest:
      type: object
      additionalProperties: false
      required:
        - sample_id
        - r1_uri
        - r2_uri
      properties:
        sample_id:
          type: string
          minLength: 1
          description: Sample identifier for this ingestion job (whitespace-only rejected by handler).
        r1_uri:
          type: string
          minLength: 1
          description: URI for read 1 (forward) — http(s), s3, or gs.
        r2_uri:
          type: string
          minLength: 1
          description: URI for read 2 (reverse) — http(s), s3, or gs.
        library_id:
          type: string
        platform:
          type: string
        notes:
          type: string
    FastqUploadMetadataResponse:
      type: object
      required:
        - job_id
      properties:
        job_id:
          type: string
          format: uuid
    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
          description: Stable code such as required or invalid_uri.
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
