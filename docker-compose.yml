services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: senju-frontend
    environment:
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - senju-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        VERSION: "0.1.0"
        COMMIT: "${GIT_COMMIT:-unknown}"
        BUILD_TIME: "${BUILD_TIME:-unknown}"
    container_name: senju-api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      MINIO_HEALTH_URL: http://minio:9000/minio/health/live
      NATS_ADDR: nats:4222
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: senju-uploads
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - senju-net

  postgres:
    image: postgres:16-alpine
    container_name: senju-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-senju}"
      POSTGRES_USER: "${POSTGRES_USER:-senju}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-senju_dev_password}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-senju} -d ${POSTGRES_DB:-senju}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - senju-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: senju-clickhouse
    env_file:
      - .env
    environment:
      CLICKHOUSE_DB: "${CLICKHOUSE_DB:-senju}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-default}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-senju_dev_password}"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - senju-net

  minio:
    image: minio/minio:latest
    container_name: senju-minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    command: server /data --console-address ":9002"
    ports:
      - "${MINIO_API_PORT:-9001}:9000"
      - "${MINIO_CONSOLE_PORT:-9002}:9002"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - senju-net

  nats:
    image: nats:2.11-alpine
    container_name: senju-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
    restart: unless-stopped
    networks:
      - senju-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: senju-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - senju-net

  loki:
    image: grafana/loki:3.1.1
    container_name: senju-loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - senju-net

  promtail:
    image: grafana/promtail:3.1.1
    container_name: senju-promtail
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./deploy/observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - senju-net

  grafana:
    image: grafana/grafana:11.1.4
    container_name: senju-grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:?set GRAFANA_ADMIN_USER in .env}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - senju-net

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  senju-net:
    name: senju-net
